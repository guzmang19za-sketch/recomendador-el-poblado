<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Poblado • Recomendador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body class="bg-white max-w-md mx-auto">

  <!-- PANTALLA 1: INICIO -->
  <div id="screen-home" class="screen active">
    <div class="relative h-[260px]">
      <img src="https://picsum.photos/id/292/800/600" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-b from-black/30 to-black/60"></div>
      <div class="absolute bottom-0 left-0 right-0 p-6 text-white">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
            <span class="text-[#FF3B30] font-bold text-2xl">EP</span>
          </div>
          <div>
            <h1 class="text-3xl font-bold">El Poblado</h1>
            <p class="text-sm opacity-90">Comida colombiana auténtica</p>
          </div>
        </div>
      </div>
    </div>

    <div class="p-6">
      <button onclick="showScreen('screen-preferences')"
              class="w-full bg-[#FF3B30] hover:bg-[#E62E26] text-white font-bold text-2xl py-6 rounded-3xl active:scale-[0.985]">
        ¿Qué me recomiendas?
      </button>
    </div>
  </div>

  <!-- PANTALLA 2: PREFERENCIAS -->
  <div id="screen-preferences" class="screen p-6">
    <h2 class="text-3xl font-bold mb-1">¿Qué estás buscando?</h2>
    <p class="text-gray-500 mb-6">Selecciona las opciones que más te interesan</p>

    <div class="space-y-3" id="preferences-list"></div>

    <div class="mt-6">
      <label class="block text-sm font-medium text-gray-600 mb-1">¿Algo más?</label>
      <textarea id="extra-text" rows="2" class="w-full border border-gray-300 rounded-2xl p-3 text-sm" 
                placeholder="Ej: Quiero algo abundante..."></textarea>
    </div>

    <button onclick="getRecommendations()"
            class="mt-6 w-full bg-[#FF3B30] text-white font-bold py-5 rounded-3xl text-xl active:scale-[0.985]">
      Ver mis recomendaciones
    </button>
  </div>

  <!-- PANTALLA 3: RECOMENDACIONES CON IA -->
  <div id="screen-results" class="screen p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-bold">Tus recomendaciones</h2>
      <button onclick="showScreen('screen-preferences')" class="text-sm text-[#FF3B30]">Cambiar</button>
    </div>

    <div id="recommendations-list" class="space-y-5">
      <!-- Generado por Groq -->
    </div>

    <div class="mt-8 flex gap-3">
      <button onclick="showScreen('screen-home')"
              class="flex-1 border border-gray-300 text-gray-700 font-medium py-4 rounded-3xl">
        Volver al inicio
      </button>
      <button onclick="showScreen('screen-preferences')"
              class="flex-1 bg-[#FF3B30] text-white font-medium py-4 rounded-3xl">
        Nueva búsqueda
      </button>
    </div>
  </div>

  <script>
    // ==================== CONFIG GROQ ====================
    const GROQ_API_KEY = "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"; // ← Reemplaza con tu API Key

    const menu = [
      { id: 1, name: "Bandeja Paisa", description: "Plato tradicional completo con arroz, frijoles, carnes y más.", goodForSharing: true, mainProtein: "Carne + Cerdo", price: 24.99, image: "https://picsum.photos/id/292/600/400" },
      { id: 5, name: "Arepa El Poblado", description: "Arepa rellena de carne desmechada, chicharrón y queso.", goodForSharing: false, mainProtein: "Carne de res", price: 13.99, image: "https://picsum.photos/id/312/600/400" },
      { id: 17, name: "Arepa Con Pollo", description: "Arepa rellena de pollo jugoso con tomate y cebolla.", goodForSharing: false, mainProtein: "Pollo", price: 11.99, image: "https://picsum.photos/id/201/600/400" },
      { id: 28, name: "Pechuga a la Colombiana", description: "Pechuga de pollo con champiñones y dos acompañamientos.", goodForSharing: false, mainProtein: "Pollo", price: 19.99, image: "https://picsum.photos/id/312/600/400" },
      { id: 8, name: "3P. Picada El Poblado", description: "Mezcla de carnes, chicharrón, plátano y arepa.", goodForSharing: true, mainProtein: "Carne + Pollo + Cerdo", price: 27.99, image: "https://picsum.photos/id/292/600/400" }
    ];

    const preferenceOptions = [
      { key: 'sharing', label: 'Para compartir', icon: 'fa-users' },
      { key: 'light', label: 'Algo ligero', icon: 'fa-leaf' },
      { key: 'meat', label: 'Prefiero carne', icon: 'fa-drumstick-bite' },
      { key: 'chicken', label: 'Prefiero pollo', icon: 'fa-drumstick-bite' }
    ];

    let selected = {};

    function renderPreferences() {
      const container = document.getElementById('preferences-list');
      container.innerHTML = '';

      preferenceOptions.forEach(pref => {
        const div = document.createElement('div');
        div.className = `flex items-center gap-4 p-4 border rounded-2xl cursor-pointer`;
        div.innerHTML = `
          <i class="fa-solid ${pref.icon} text-[#FF3B30] text-2xl w-8"></i>
          <span class="font-medium">${pref.label}</span>
        `;
        div.onclick = () => {
          if (selected[pref.key]) {
            delete selected[pref.key];
            div.classList.remove('!border-[#FF3B30]', '!bg-red-50');
          } else {
            selected[pref.key] = true;
            div.classList.add('!border-[#FF3B30]', '!bg-red-50');
          }
        };
        container.appendChild(div);
      });
    }

    // ==================== LLAMADA A GROQ ====================
    async function getRecommendationsFromGroq(preferences, dishes) {
      const prompt = `Eres un recomendador experto del restaurante El Poblado.

Preferencias del cliente: ${JSON.stringify(preferences)}

Platos disponibles: ${JSON.stringify(dishes)}

Devuelve exactamente 3 recomendaciones en este formato JSON:
{
  "recommendations": [
    {
      "name": "Nombre del plato",
      "reason": "Explicación corta y atractiva de por qué lo recomiendas",
      "pairing": "Sugerencia de bebida o acompañamiento"
    }
  ]
}`;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${GROQ_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { role: "system", content: "Eres un experto en comida colombiana del restaurante El Poblado." },
              { role: "user", content: prompt }
            ],
            temperature: 0.7,
            max_tokens: 700,
            response_format: { type: "json_object" }
          })
        });

        const data = await response.json();
        return JSON.parse(data.choices[0].message.content);
      } catch (error) {
        console.error("Error con Groq:", error);
        return { recommendations: [] };
      }
    }

    async function getRecommendations() {
      const extra = document.getElementById('extra-text').value;
      let filtered = [...menu];

      if (selected.sharing) filtered = filtered.filter(d => d.goodForSharing);
      if (selected.light) filtered = filtered.filter(d => d.mainProtein.toLowerCase().includes("pollo"));
      if (selected.meat) filtered = filtered.filter(d => d.mainProtein.toLowerCase().includes("carne") || d.mainProtein.toLowerCase().includes("cerdo"));
      if (selected.chicken) filtered = filtered.filter(d => d.mainProtein.toLowerCase().includes("pollo"));

      if (filtered.length === 0) filtered = menu;

      const container = document.getElementById('recommendations-list');
      container.innerHTML = `<p class="text-center text-gray-500 py-8">Generando recomendaciones con IA...</p>`;

      const result = await getRecommendationsFromGroq(
        { sharing: selected.sharing, light: selected.light, meat: selected.meat, chicken: selected.chicken, extra },
        filtered
      );

      container.innerHTML = '';

      result.recommendations.forEach((rec, index) => {
        const dish = filtered[index] || filtered[0];
        
        const div = document.createElement('div');
        div.className = `border border-gray-200 rounded-2xl overflow-hidden`;
        div.innerHTML = `
          <div class="relative">
            <img src="${dish.image}" class="w-full h-44 object-cover">
            <div class="absolute top-3 right-3 bg-white px-3 py-1 rounded-full shadow text-sm font-bold text-[#FF3B30]">
              $${dish.price}
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-bold text-xl">${rec.name}</h3>
            <p class="text-sm text-gray-600 mt-2">${dish.description}</p>
            
            <div class="mt-4 pt-4 border-t">
              <div class="flex items-start gap-2">
                <i class="fa-solid fa-lightbulb text-[#FF3B30] mt-1"></i>
                <div>
                  <p class="text-xs font-semibold text-gray-500">POR QUÉ TE LO RECOMENDAMOS</p>
                  <p class="text-sm">${rec.reason}</p>
                </div>
              </div>
              <div class="mt-3 flex items-start gap-2">
                <i class="fa-solid fa-glass-cheers text-[#FF3B30] mt-1"></i>
                <div>
                  <p class="text-xs font-semibold text-gray-500">ACOMPAÑAMIENTO SUGERIDO</p>
                  <p class="text-sm">${rec.pairing}</p>
                </div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });

      showScreen('screen-results');
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    renderPreferences();
  </script>

</body>
</html>
